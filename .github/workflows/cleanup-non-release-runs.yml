name: Cleanup Short Workflow Runs

on:
  # 手动触发
  workflow_dispatch:
  # 每月执行：每月1号 00:30 UTC 运行
  schedule:
    - cron: '30 0 1 * *'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # 最小权限原则，仅授予必须的权限
    permissions:
      actions: write  # 必须：删除工作流运行记录
      contents: none  # 本脚本无需检出代码，关闭权限更安全

    steps:
      # 优化：脚本不需要检出代码，删除冗余步骤
      - name: Install dependencies (jq + curl)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Fetch recent workflow runs
        id: fetch_runs
        run: |
          echo "📥 Fetching workflow runs from GitHub API..."
          # 请求API获取最近500条工作流运行记录
          curl -s -f -o runs.json \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=500"
          
          echo "✅ Successfully fetched workflow runs"

      - name: Delete short completed workflow runs (< 100 minutes)
        run: |
          echo "🔍 Starting cleanup of short workflow runs..."
          threshold=6000  # 100分钟 = 6000秒
          
          # 检查是否有运行记录
          if ! jq -e '.workflow_runs | length > 0' runs.json >/dev/null 2>&1; then
            echo "ℹ️ No workflow runs found, exiting"
            exit 0
          fi

          # 遍历已完成的运行记录
          jq -r '.workflow_runs[] | select(.status == "completed") | [.id, .run_started_at, .updated_at] | @tsv' runs.json | while IFS=$'\t' read -r run_id start_time end_time; do
            # 转换时间为时间戳
            start_ts=$(date -d "$start_time" +%s 2>/dev/null)
            end_ts=$(date -d "$end_time" +%s 2>/dev/null)
            
            # 时间格式校验
            if [[ -z "$start_ts" || -z "$end_ts" ]]; then
              echo "⚠️ Skipping run $run_id: invalid time format"
              continue
            fi

            # 计算运行时长
            duration=$((end_ts - start_ts))
            
            # 短耗时记录执行删除
            if [[ $duration -lt $threshold ]]; then
              echo "🗑️ Deleting run $run_id (duration: ${duration}s < ${threshold}s)..."
              del_code=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id")
              
              # 输出删除结果
              if [[ $del_code -eq 204 ]]; then
                echo "✅ Successfully deleted run $run_id"
              else
                echo "❌ Failed to delete run $run_id (HTTP $del_code)"
              fi
            else
              echo "✅ Keeping run $run_id (duration: ${duration}s)"
            fi
          done
